name: Build Python Wheels
# Builds Python wheels for Open Babel using cibuildwheel and publishes to
# PyPI on tagged releases. Adapted from the avogadrolibs build_wheels.yml.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - ".github/workflows/build_wheels.yml"
      - "scripts/github-actions/**"
      - "scripts/python/**"
      - "scripts/openbabel-python.i"
      - "scripts/stereo.i"
  push:
    branches:
      - master
    tags:
      - "openbabel-*"
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All cibuildwheel options that don't depend on the runner live in
# pyproject.toml under [tool.cibuildwheel]. The few that do are here.
env:
  # Skip 3.9 (project minimum is 3.10), 32-bit Windows, musllinux, and
  # Linux i686 builds in the first pass.
  CIBW_SKIP: "cp39-* *-musllinux* *-manylinux_i686 *-win32"
  # We don't have the toolchain set up to test arm64 mac wheels on x64 runners.
  CIBW_TEST_SKIP: "*_arm64"

defaults:
  run:
    shell: bash

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: linux-arm
            runs-on: ubuntu-24.04-arm
          - os: windows-intel
            runs-on: windows-latest
          - os: macos-intel
            runs-on: macos-15-intel
          - os: macos-arm
            runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # setuptools-scm needs the full history for tag-based version detection.
          fetch-depth: 0

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
          CIBW_ARCHS: ${{ matrix.archs || 'auto' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    name: Upload wheels to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openbabel
    permissions:
      id-token: write
    # Only publish on tagged pushes (tags of the form openbabel-X.Y.Z) and
    # on GitHub release events.
    if: |
      (github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/openbabel-'))
      || github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        # Trusted publisher: no token needed once configured at
        # https://pypi.org/manage/account/publishing/
