name: Cross-Compile OpenBabel for Windows AMD64 (Direct)
on:
  workflow_dispatch:

jobs:
  cross-compile-openbabel:
    runs-on: ubuntu-latest

    steps:
    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64
        sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
        sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

    - name: Checkout OpenBabel repository
      run: |
        git clone https://github.com/openbabel/openbabel.git
        cd openbabel

    - name: Create mingw toolchain file
      run: |
        mkdir -p cmake/toolchains
        cat <<EOF > cmake/toolchains/mingw_toolchain.cmake
        # Toolchain für die Kompilierung nach Windows mit mingw
        set(CMAKE_SYSTEM_NAME Windows)
        set(CMAKE_SYSTEM_PROCESSOR AMD64)

        # Compiler für C und C++
        set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
        set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)

        # Pfade zu den mingw-Bibliotheken
        set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32)
        set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
        set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
        EOF

    - name: Disable InChI in OpenBabel
      run: |
        cd openbabel
        # Benenne das InChI-Verzeichnis um, damit es nicht kompiliert wird
        mv src/formats/libinchi src/formats/libinchi_disabled

    - name: Build OpenBabel with mingw
      run: |
        cd openbabel
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchains/mingw_toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_GUI=OFF \
          -DRUN_SWIG=OFF \
          -DHAVE_EIGEN3=ON \
          -DHAVE_ZLIB=ON \
          -DBUILD_SHARED_LIBS=OFF \
          -DOPENBABEL_USE_INCHI=OFF \
          -DINCHI_LIBRARY=OFF \
          -DINCHI_INCLUDE_DIR=OFF
        make -j$(nproc)

        # Kopiere die generierten .exe-Dateien in einen Ordner
        mkdir -p /tmp/openbabel-bin
        find . -name "*.exe" -exec cp {} /tmp/openbabel-bin/ \;

    - name: Compress binaries
      run: |
        tar -czvf openbabel-windows-amd64.tar.gz -C /tmp/openbabel-bin .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        path: openbabel-windows-amd64.tar.gz
