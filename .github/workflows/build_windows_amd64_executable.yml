name: Cross-Compile OpenBabel for Windows AMD64
on:
  workflow_dispatch:

jobs:
  cross-compile-openbabel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install cross-compilation tools and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64
        sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
        sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

    - name: Install vcpkg for cross-compilation
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install zlib eigen3 boost --triplet x64-windows

    - name: Build OpenBabel
      run: |
        git clone https://github.com/openbabel/openbabel.git
        cd openbabel
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=../../vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_GUI=OFF \
          -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
          -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
          -DCMAKE_SYSTEM_NAME=Windows \
          -DCMAKE_SYSTEM_PROCESSOR=AMD64
        make -j$(nproc)

        # Kopiere die generierten .exe-Dateien in einen Ordner
        mkdir -p /tmp/openbabel-bin
        find . -name "*.exe" -exec cp {} /tmp/openbabel-bin/ \;

    - name: Compress binaries
      run: |
        tar -czvf openbabel-windows-amd64.tar.gz -C /tmp/openbabel-bin .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        path: openbabel-windows-amd64.tar.gz
