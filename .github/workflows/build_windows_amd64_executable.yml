name: Build OpenBabel for Windows AMD64
on:
  workflow_dispatch:

jobs:
  build-openbabel-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install vcpkg manually
      run: |
        # Klone vcpkg aus dem offiziellen Repository
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        # Bootstrap vcpkg
        cd C:\vcpkg
        .\bootstrap-vcpkg.bat
        # vcpkg zur PATH-Variable hinzufügen
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User") + ";C:\vcpkg"
        # Installiere Abhängigkeiten (eigen3, zlib, libxml2, boost)
        .\vcpkg.exe install zlib eigen3 libxml2 boost

    - name: Setup Visual Studio 2026 for CMake
      run: |
        $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
        Write-Output "Visual Studio path: $vsPath"
        $env:VSINSTALLDIR = "$vsPath"
        $env:VisualStudioVersion = "18.0"
        $env:Path += ";$vsPath\MSBuild\Current\Bin"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: 18.0

    - name: Build OpenBabel
      run: |
        # Klone OpenBabel
        git clone https://github.com/openbabel/openbabel.git
        cd openbabel

        # Erstelle Build-Verzeichnis
        mkdir build
        cd build

        # CMake mit allen notwendigen Optionen aufrufen
        cmake .. -G "Visual Studio 18 2026" -A x64 `
                 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
                 -DBOOST_ROOT="C:/vcpkg/installed/x64-windows" `
                 -DBoost_DIR="C:/vcpkg/installed/x64-windows/share/boost" `
                 -DBUILD_GUI=OFF

        # Überprüfe, ob die .sln-Datei im Wurzelverzeichnis des Repositorys existiert
        if (Test-Path "../OpenBabel.sln") {
          Write-Output "OpenBabel.sln found in the root directory. Using it."
          $slnPath = "../OpenBabel.sln"
        } elseif (Test-Path "OpenBabel.sln") {
          Write-Output "OpenBabel.sln found in the build directory."
          $slnPath = "OpenBabel.sln"
        } else {
          Write-Error "OpenBabel.sln not found in the repository or build directory!"
          Get-ChildItem -Recurse
          exit 1
        }

        # Build mit MSBuild
        msbuild $slnPath /p:Configuration=Release /p:Platform=x64 /v:diag
    
        # Überprüfe, ob die Build-Dateien existieren
        $buildDirs = @(
          ".\Release",
          ".\bin\Release",
          ".\bin"
        )

        $exeFound = $false
        foreach ($dir in $buildDirs) {
          if (Test-Path $dir) {
            Write-Output "Found directory: $dir"
            $exeFiles = Get-ChildItem -Path $dir -Filter "*.exe" -Recurse
            if ($exeFiles) {
              Write-Output "Copying .exe files from $dir to C:\openbabel\bin\amd64"
              New-Item -ItemType Directory -Path "C:\openbabel\bin\amd64" -Force | Out-Null
              Copy-Item $exeFiles -Destination "C:\openbabel\bin\amd64" -Force
              $exeFound = $true
              break
            }
          }
        }

        if (-not $exeFound) {
          Write-Error "Neither Release nor bin directory found!"
          Get-ChildItem -Recurse
          exit 1
        }


    - name: Compress binaries
      run: |
        if (!(Test-Path C:\openbabel\bin\amd64)) { mkdir C:\openbabel\bin\amd64 -Force }
        cd C:\openbabel\bin\amd64
        tar -czvf openbabel-windows-amd64.tar.gz .
        Move-Item .\openbabel-windows-amd64.tar.gz ..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        path: C:\openbabel\openbabel-windows-amd64.tar.gz
