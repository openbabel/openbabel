name: Build OpenBabel for Windows AMD64
on:
  workflow_dispatch:

jobs:
  build-openbabel-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Install Visual Studio Build Tools
      run: |
        choco install visualstudio2019buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.NativeDesktop --includeRecommended"
        choco install vcpkg -y
        vcpkg install zlib eigen3

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1
      with:
        vs-version: '[16.0,17.0)'

    - name: Build OpenBabel
      run: |
        git clone https://github.com/openbabel/openbabel.git
        cd openbabel
        mkdir build
        cd build
        cmake .. -G "Visual Studio 16 2019" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        msbuild OpenBabel.sln /p:Configuration=Release
        powershell Copy-Item .\bin\*_d.exe C:\openbabel\bin\amd64\

    - name: Compress binaries
      run: |
        cd C:\openbabel\bin\amd64
        tar -czvf openbabel-windows-amd64.tar.gz .
        powershell Move-Item .\openbabel-windows-amd64.tar.gz ..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        path: C:\openbabel\bin\amd64\openbabel-windows-amd64.tar.gz
