name: Build OpenBabel for Windows AMD64
on:
  workflow_dispatch:

jobs:
  build-openbabel-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install vcpkg and dependencies
      run: |
        choco install vcpkg -y
        vcpkg install zlib eigen3
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

    - name: Setup Visual Studio 2022 for CMake
      run: |
        $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
        Write-Output "Visual Studio path: $vsPath"
        $env:VSINSTALLDIR = "$vsPath"
        $env:VisualStudioVersion = "17.0"
        $env:Path += ";$vsPath\MSBuild\Current\Bin"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: 17.0

    - name: Build OpenBabel
      run: |
        git clone https://github.com/openbabel/openbabel.git
        cd openbabel
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        msbuild OpenBabel.sln /p:Configuration=Release /p:Platform=x64
        if (Test-Path .\Release) {
          Copy-Item .\Release\*_d.exe C:\openbabel\bin\amd64\ -Force
        } elseif (Test-Path .\bin) {
          Copy-Item .\bin\*_d.exe C:\openbabel\bin\amd64\ -Force
        } else {
          Write-Error "Neither Release nor bin directory found!"
          Get-ChildItem -Recurse
        }

    - name: Compress binaries
      run: |
        if (!(Test-Path C:\openbabel\bin\amd64)) { mkdir C:\openbabel\bin\amd64 -Force }
        cd C:\openbabel\bin\amd64
        tar -czvf openbabel-windows-amd64.tar.gz .
        Move-Item .\openbabel-windows-amd64.tar.gz ..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        path: C:\openbabel\openbabel-windows-amd64.tar.gz
