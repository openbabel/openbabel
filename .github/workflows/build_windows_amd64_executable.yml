name: Build OpenBabel for Linux AMD64 on os.rnnner ubuntu
# because building an executable on os.runner Windows for Windows failed
# and because cross-compilation on os.runner Ubuntu for Windows equally failed
on:
  workflow_dispatch:

jobs:
  build-openbabel-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ git libboost-all-dev libeigen3-dev zlib1g-dev

    - name: Checkout OpenBabel repository
      run: |
        git clone https://github.com/openbabel/openbabel.git
        cd openbabel

    - name: Build OpenBabel
      run: |
        cd openbabel
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_GUI=OFF \
          -DRUN_SWIG=OFF
        make -j$(nproc)

        # Kopiere die generierten Binaries in einen Ordner
        mkdir -p /tmp/openbabel-bin
        find . -name "obabel" -exec cp {} /tmp/openbabel-bin/ \;
        find . -name "*.so" -exec cp {} /tmp/openbabel-bin/ \;

    - name: Compress binaries
      run: |
        tar -czvf openbabel-linux-amd64.tar.gz -C /tmp/openbabel-bin .

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: openbabel-linux-amd64
        path: openbabel-linux-amd64.tar.gz
